<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{ --radius: 10px; }
  [data-theme="sage"]{
    --bg:#f4f7f2; --surface:#ffffff; --surface-alt:#eaf0e6; --border:#d3ddce;
    --text:#3d4a37; --text-muted:#748268; --accent:#8fae7c; --accent-text:#ffffff; --accent-hover:#7d9c6a;
  }
  [data-theme="lavender"]{
    --bg:#f6f4f9; --surface:#ffffff; --surface-alt:#ece5f3; --border:#ddd0e8;
    --text:#453a52; --text-muted:#87788f; --accent:#a58cc4; --accent-text:#ffffff; --accent-hover:#9179b3;
  }
  [data-theme="blush"]{
    --bg:#faf4f5; --surface:#ffffff; --surface-alt:#f5e6e9; --border:#edd3d8;
    --text:#55383e; --text-muted:#93777c; --accent:#d894a0; --accent-text:#ffffff; --accent-hover:#c67c89;
  }
  [data-theme="sky"]{
    --bg:#f2f6f9; --surface:#ffffff; --surface-alt:#e3edf4; --border:#cddce6;
    --text:#33454f; --text-muted:#6f8590; --accent:#7fa8c4; --accent-text:#ffffff; --accent-hover:#6994b2;
  }
  [data-theme="sand"]{
    --bg:#f8f5f0; --surface:#ffffff; --surface-alt:#f0e8db; --border:#e3d6c1;
    --text:#55483a; --text-muted:#948572; --accent:#c9a876; --accent-text:#4a3d24; --accent-hover:#b8955f;
  }
  [data-theme="mist"]{
    --bg:#f4f5f6; --surface:#ffffff; --surface-alt:#e7eaec; --border:#d4d9dc;
    --text:#3c4247; --text-muted:#7a8288; --accent:#8fa0aa; --accent-text:#ffffff; --accent-hover:#7c8f9a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
  }
  #app{max-width:640px;margin:0 auto;padding:20px 16px 60px;}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
  h1{font-size:1.3rem;margin:0;font-weight:600;letter-spacing:.2px;}
  .header-right{display:flex;align-items:center;gap:8px;}
  .swatches{display:flex;gap:6px;}
  .swatch{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;}
  .swatch.active{border-color:var(--text);}
  .swatch[data-c="sage"]{background:#8fae7c;}
  .swatch[data-c="lavender"]{background:#a58cc4;}
  .swatch[data-c="blush"]{background:#d894a0;}
  .swatch[data-c="sky"]{background:#7fa8c4;}
  .swatch[data-c="sand"]{background:#c9a876;}
  .swatch[data-c="mist"]{background:#8fa0aa;}

  button{font-family:inherit;cursor:pointer;}
  .btn{background:var(--accent);color:var(--accent-text);border:none;border-radius:8px;padding:8px 14px;font-size:.85rem;font-weight:500;}
  .btn:hover{background:var(--accent-hover);}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:.85rem;}
  .btn-ghost:hover{background:var(--surface-alt);}
  .icon-btn{background:transparent;border:1px solid var(--border);border-radius:8px;width:34px;height:34px;color:var(--text);font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .icon-btn:hover{background:var(--surface-alt);}

  .month-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .month-title{font-size:1.1rem;font-weight:600;flex:1;text-align:center;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
  .week-card{cursor:pointer;transition:background .15s;}
  .week-card:hover{background:var(--surface-alt);}
  .week-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .week-label{font-weight:600;font-size:.95rem;}
  .week-range{color:var(--text-muted);font-size:.8rem;}
  .dot-row{display:flex;gap:5px;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--border);}
  .dot.filled{background:var(--accent);}
  .dot.today-ring{box-shadow:0 0 0 2px var(--text-muted);}

  .day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
  .day-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;}
  .day-card:hover{background:var(--surface-alt);}
  .day-card.today{border-color:var(--accent);border-width:2px;}
  .day-card.outside-month{opacity:.5;}
  .day-card .dow{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;}
  .day-card .dnum{font-size:1.1rem;font-weight:600;margin:4px 0;}
  .progress-mini{height:4px;background:var(--surface-alt);border-radius:2px;overflow:hidden;margin-top:4px;}
  .progress-mini-fill{height:100%;background:var(--accent);}
  .entry-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin:4px auto 0;}

  .back-link{background:none;border:none;color:var(--text-muted);font-size:.85rem;padding:0;margin-bottom:14px;display:flex;align-items:center;gap:4px;}
  .back-link:hover{color:var(--text);}

  .day-heading{font-size:1.25rem;font-weight:600;margin:0 0 4px;}
  .day-sub{color:var(--text-muted);font-size:.85rem;margin:0 0 18px;}

  section.block{margin-bottom:22px;}
  h2.block-title{font-size:.8rem;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin:0 0 10px;font-weight:600;}

  ul.checklist{list-style:none;padding:0;margin:0 0 10px;}
  ul.checklist li{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--border);}
  ul.checklist li:last-child{border-bottom:none;}
  ul.checklist input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;}
  ul.checklist label{flex:1;font-size:.92rem;cursor:pointer;}
  ul.checklist li.checked label{color:var(--text-muted);text-decoration:line-through;}
  .del-item{background:none;border:none;color:var(--text-muted);font-size:1rem;padding:2px 6px;line-height:1;}
  .del-item:hover{color:var(--text);}
  .checklist-note{font-size:.75rem;color:var(--text-muted);margin:0 0 10px;}

  .add-item-row{display:flex;gap:8px;}
  .add-item-row input{flex:1;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:.88rem;background:var(--surface);color:var(--text);}
  .add-item-row input:focus{outline:none;border-color:var(--accent);}

  .prompt-box{background:var(--surface-alt);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
  .prompt-text{font-size:.98rem;font-style:italic;margin:0;}
  .prompt-actions{margin-top:8px;}

  textarea{width:100%;min-height:220px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:inherit;font-size:.95rem;line-height:1.5;resize:vertical;}
  textarea:focus{outline:none;border-color:var(--accent);}
  .save-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
  .save-indicator{font-size:.75rem;color:var(--text-muted);opacity:0;transition:opacity .3s;}
  .save-indicator.show{opacity:1;}
  .word-count{font-size:.75rem;color:var(--text-muted);}

  .stats-row{display:flex;gap:10px;margin-bottom:18px;}
  .stat-pill{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;text-align:center;}
  .stat-pill strong{display:block;font-size:1.3rem;font-weight:700;color:var(--text);}
  .stat-pill span{font-size:.75rem;color:var(--text-muted);}
  .home-cta{width:100%;margin-bottom:8px;}

  .hidden{display:none !important;}
  .auth-wrap{max-width:390px;margin:34px auto 0;padding:0 4px;}
  .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;}
  .auth-mark{text-align:center;font-size:2rem;margin-bottom:8px;}
  .auth-title{text-align:center;font-size:1.35rem;margin:0 0 6px;}
  .auth-sub{text-align:center;color:var(--text-muted);font-size:.86rem;line-height:1.45;margin:0 0 20px;}
  .auth-field{width:100%;padding:10px 11px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:.92rem;margin-bottom:9px;}
  .auth-field:focus{outline:none;border-color:var(--accent);}
  .auth-primary{width:100%;padding:10px 14px;margin-top:2px;}
  .auth-links{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:13px;}
  .text-btn{background:none;border:none;color:var(--text-muted);font-size:.82rem;padding:2px;}
  .text-btn:hover{color:var(--text);}
  .form-message{font-size:.82rem;line-height:1.4;min-height:18px;margin:8px 0 2px;color:var(--text-muted);}
  .form-message.error{color:#b33a31;}
  .form-message.success{color:#3e7548;}
  .setup-code{display:block;text-align:left;white-space:pre-wrap;word-break:break-word;background:var(--surface-alt);border-radius:8px;padding:10px;font-size:.78rem;margin:10px 0;}
  .account-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
  .account-row:last-child{border-bottom:none;}
  .account-label{font-size:.82rem;color:var(--text-muted);}
  .account-value{font-size:.88rem;text-align:right;word-break:break-all;}
  .settings-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .danger-btn{color:#a4312b;border-color:#e1b9b6;}
  .sync-status{font-size:.72rem;color:var(--text-muted);white-space:nowrap;}
  .sync-status.error{color:#b33a31;}
  .sync-status.ok{color:#3e7548;}
  .file-input{display:none;}

  .loading{text-align:center;padding:60px 0;color:var(--text-muted);}
  @media (max-width:420px){
    .day-card{padding:8px 3px;}
    .day-card .dnum{font-size:.95rem;}
  }
</style>
</head>
<body data-theme="sage">
<div id="app">
  <header id="app-header" class="hidden">
    <button class="icon-btn" id="home-btn" title="Home">⌂</button>
    <h1>Daybook</h1>
    <div class="header-right">
      <span class="sync-status" id="sync-status"></span>
      <button class="icon-btn" id="settings-btn" title="Settings">⚙</button>
      <div class="swatches" id="swatches"></div>
    </div>
  </header>
  <div id="content"><div class="loading">Loading Daybook…</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  const THEMES = ['sage','lavender','blush','sky','sand','mist'];
  const PROMPTS = [
    "What's something funny that happened today?",
    "Are you happy with what you did today?",
    "What's one thing you're grateful for right now?",
    "What was the hardest part of today, and how did you handle it?",
    "Who made you smile today?",
    "What's something you learned today?",
    "If today had a title, what would it be?",
    "What's one small win you had today?",
    "What are you looking forward to tomorrow?",
    "What's something you'd do differently if you could redo today?",
    "Describe today in three words.",
    "What made you feel proud today?",
    "What's on your mind that you haven't said out loud?",
    "What's a conversation that stuck with you today?",
    "What did you do today that your future self will thank you for?",
    "What drained your energy today, and what gave you energy?",
    "What's something you're avoiding right now?",
    "What surprised you today?",
    "How did you take care of yourself today?",
    "What's a small thing that annoyed you today, and does it really matter?",
    "What did you create, build, or fix today?",
    "What's a moment from today you want to remember?",
    "How are you really feeling right now?",
    "What's something kind someone did for you today?",
    "What's something kind you did for someone else today?",
    "What question do you wish someone had asked you today?",
    "What's one thing you want to let go of before tomorrow?",
    "What did today teach you about yourself?",
    "What's something you're curious about right now?",
    "If you could tell yourself one thing this morning, what would it be?"
  ];

  const AFFIRMATIONS = [
    "You're capable of figuring this out.",
    "Progress doesn't have to be perfect to count.",
    "You've handled hard things before.",
    "One task at a time is enough.",
    "You don't have to feel ready to start.",
    "Today's effort counts, even if it's small.",
    "You get to define what success looks like.",
    "Rest is part of the process, not a break from it.",
    "You're allowed to change your mind.",
    "Consistency matters more than intensity.",
    "Doubt isn't proof you're doing it wrong.",
    "Small steps still move you forward.",
    "You can be proud and still want more.",
    "It's okay not to have it all figured out yet.",
    "Your pace is still progress.",
    "You're building something, even on slow days.",
    "Confidence comes from doing, not from waiting to feel ready.",
    "You don't have to earn rest.",
    "What you're working on matters, even when it's invisible right now.",
    "You can reset at any point in the day.",
    "Showing up inconsistently still beats not showing up.",
    "You're allowed to move at your own speed.",
    "Effort compounds even when results are slow.",
    "You don't need to have the answer today."
  ];

  const SEED_ITEMS = [
    "Content Review",
    "Jack Westin",
    "Tangen Projects Brainstorm",
    "Send CGT emails",
    "Attempt Rajapakse Project within own, keep tabs",
    "Follow up with hamza",
    "Miner Lab papers",
    "RVCL brain imaging stuff",
    "Primer design + message to debby about experiment",
    "Get back to yi-an continue thinking through calendar and med school app",
    "EMT applications and clinical volunteering - narberth follow up after ARD",
    "orthopedic surgeon interviews / senior design + shadowing",
    "Explore the handshake stuff like consulting etc.",
    "Address holes in med school application - talk to chat/claude",
    "some venmo requests from sandro, shiv, family",
    "Get back to erika",
    "Tour tomorrow"
  ];

  const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // Paste the values from Supabase: Project Settings → API.
  // Use the Project URL and the publishable key (or legacy anon key).
  // Never place a service_role or secret key in this file.
  const SUPABASE_URL = 'https://gtwtarpcalhsfnjlihdx.supabase.co';
  const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_WxK70tPIc5kFduJof4SV-g_HHvgEy07';

  const CONFIGURED =
    /^https:\/\/.+\.supabase\.co$/.test(SUPABASE_URL) &&
    !SUPABASE_PUBLISHABLE_KEY.startsWith('PASTE_') &&
    SUPABASE_PUBLISHABLE_KEY.length > 20;

  const LEGACY_STORAGE_KEY = 'daybook-state';
  let supabaseClient = null;
  let currentUser = null;
  let state = { theme:'sage', checklistItems: [], goals: [], homeAffirmation: null, days: {} };
  let saveTimer = null;
  let syncQueue = Promise.resolve();
  let appReady = false;
  let recoveryMode = false;
  let enteringUserId = null;

  const today = new Date();
  const todayStr = fmt(today);
  let nav = { view:'home', year: today.getFullYear(), month: today.getMonth(), weekDays: null, dateStr: null };

  const contentEl = document.getElementById('content');
  const swatchesEl = document.getElementById('swatches');
  const headerEl = document.getElementById('app-header');
  const syncStatusEl = document.getElementById('sync-status');

  function pad(n){ return n<10 ? '0'+n : ''+n; }
  function fmt(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function parseDateStr(s){ const p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
  function niceDate(d){ return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }
  function shortRange(a,b){
    return a.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+b.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }

  function getDay(dateStr){ return state.days[dateStr] || null; }
  function ensureDay(dateStr){
    if(!state.days[dateStr]) state.days[dateStr] = { journalText:'', promptIndex:null };
    return state.days[dateStr];
  }

  function hashIndex(str, mod){
    let h=0;
    for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
    return h % mod;
  }
  function getPromptForDate(dateStr){
    const day = getDay(dateStr);
    if(day && day.promptIndex!==null && day.promptIndex!==undefined) return PROMPTS[day.promptIndex];
    return PROMPTS[hashIndex(dateStr, PROMPTS.length)];
  }
  function getAffirmationForToday(){
    if(state.homeAffirmation && state.homeAffirmation.date===todayStr){
      return AFFIRMATIONS[state.homeAffirmation.index];
    }
    return AFFIRMATIONS[hashIndex(todayStr, AFFIRMATIONS.length)];
  }

  function makeChecklistItem(text, createdDate='0000-01-01', id=null){
    return {
      id: id || 'c'+Date.now()+Math.random().toString(36).slice(2,7),
      text,
      createdDate,
      doneDate: null
    };
  }

  function defaultChecklistItems(){
    const base = [
      makeChecklistItem('Drink water', '0000-01-01', 'c1'),
      makeChecklistItem('Move your body', '0000-01-01', 'c2'),
      makeChecklistItem('Read for 15 minutes', '0000-01-01', 'c3')
    ];
    SEED_ITEMS.forEach((text, index)=>{
      base.push(makeChecklistItem(text, '0000-01-01', 'seed-'+index));
    });
    return base;
  }

  function defaultState(){
    return {
      theme:'sage',
      checklistItems: defaultChecklistItems(),
      goals: [],
      homeAffirmation: null,
      days:{},
      lastModified: 0
    };
  }

  function normalizeState(raw){
    const normalized = Object.assign(defaultState(), raw && typeof raw==='object' ? raw : {});
    if(!Array.isArray(normalized.checklistItems)) normalized.checklistItems = [];
    normalized.checklistItems = normalized.checklistItems
      .filter(it=>it && typeof it.text==='string')
      .map(it=>({
        id: it.id || 'c'+Date.now()+Math.random().toString(36).slice(2,7),
        text: it.text,
        createdDate: it.createdDate || '0000-01-01',
        doneDate: it.doneDate || null
      }));
    if(!Array.isArray(normalized.goals)) normalized.goals = [];
    if(!normalized.days || typeof normalized.days!=='object' || Array.isArray(normalized.days)) normalized.days = {};
    if(!THEMES.includes(normalized.theme)) normalized.theme = 'sage';
    if(!Number.isFinite(Number(normalized.lastModified))) normalized.lastModified = 0;
    normalized.lastModified = Number(normalized.lastModified) || 0;
    delete normalized.passcodeHash;
    return normalized;
  }

  function cacheKey(){
    return currentUser ? `daybook-state:${currentUser.id}` : null;
  }

  function readCachedState(){
    const keys = [cacheKey(), LEGACY_STORAGE_KEY].filter(Boolean);
    for(const key of keys){
      try{
        const raw = localStorage.getItem(key);
        if(raw) return JSON.parse(raw);
      }catch(e){}
    }
    return null;
  }

  function writeCachedState(snapshot){
    const key = cacheKey();
    if(!key) return;
    try{ localStorage.setItem(key, JSON.stringify(snapshot)); }catch(e){}
  }

  function setSyncStatus(text, kind=''){
    syncStatusEl.textContent = text || '';
    syncStatusEl.className = `sync-status ${kind}`.trim();
  }

  function showAppHeader(show){
    headerEl.classList.toggle('hidden', !show);
  }

  async function loadState(){
    contentEl.innerHTML = '<div class="loading">Loading your journal…</div>';
    const cachedRaw = readCachedState();
    const cached = cachedRaw ? normalizeState(cachedRaw) : null;

    try{
      const { data, error } = await supabaseClient
        .from('daybooks')
        .select('journal_data, updated_at')
        .eq('user_id', currentUser.id)
        .maybeSingle();
      if(error) throw error;

      const cloud = data && data.journal_data ? normalizeState(data.journal_data) : null;

      // Keep the newest copy. This prevents a stale cloud row from undoing a
      // recently checked item when a prior sync attempt failed.
      if(cached && (!cloud || cached.lastModified > cloud.lastModified)){
        state = cached;
        try{
          await persistState(state);
        }catch(error){
          setSyncStatus('Offline copy', 'error');
        }
      } else if(cloud){
        state = cloud;
        writeCachedState(state);
        setSyncStatus('Synced', 'ok');
      } else {
        state = cached || defaultState();
        state.lastModified = Date.now();
        await persistState(state);
        try{ localStorage.removeItem(LEGACY_STORAGE_KEY); }catch(e){}
      }
    }catch(error){
      if(cached){
        state = cached;
        setSyncStatus('Offline copy', 'error');
      } else {
        throw error;
      }
    }

    writeCachedState(state);
    document.body.setAttribute('data-theme', state.theme || 'sage');
    renderSwatches();
  }

  async function persistState(snapshot){
    if(!currentUser || !supabaseClient) return;
    writeCachedState(snapshot);
    setSyncStatus('Saving…');

    const { error } = await supabaseClient
      .from('daybooks')
      .upsert({
        user_id: currentUser.id,
        journal_data: snapshot,
        updated_at: new Date().toISOString()
      }, { onConflict:'user_id' });

    if(error){
      setSyncStatus('Sync failed', 'error');
      throw error;
    }
    setSyncStatus('Synced', 'ok');
  }

  async function saveState(immediate){
    if(saveTimer) clearTimeout(saveTimer);
    state.lastModified = Date.now();
    const snapshot = JSON.parse(JSON.stringify(state));
    writeCachedState(snapshot);

    const run = ()=>{
      const queuedSave = syncQueue
        .catch(()=>{})
        .then(()=>persistState(snapshot));
      syncQueue = queuedSave.catch(error=>console.error('Daybook sync failed:', error));
      return queuedSave;
    };

    if(immediate) return run();
    saveTimer = setTimeout(run, 650);
  }

  function renderSwatches(){
    swatchesEl.innerHTML = THEMES.map(t=>
      `<button class="swatch ${state.theme===t?'active':''}" data-c="${t}" title="${t}"></button>`
    ).join('');
    swatchesEl.querySelectorAll('.swatch').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.theme = btn.getAttribute('data-c');
        document.body.setAttribute('data-theme', state.theme);
        renderSwatches();
        saveState(true);
      });
    });
  }

  function currentPageUrl(){
    return window.location.origin + window.location.pathname;
  }

  function renderConfigNeeded(){
    showAppHeader(false);
    contentEl.innerHTML = `
      <div class="auth-wrap">
        <div class="auth-card">

    const email = document.getElementById('auth-email');
    const password = document.getElementById('auth-password');

    async function submitAuth(){
      const emailValue = email.value.trim();
      const passwordValue = password.value;
      messageEl.className = 'form-message';
      messageEl.textContent = '';
      if(!emailValue || !passwordValue){
        messageEl.className = 'form-message error';
        messageEl.textContent = 'Enter your email and password.';
        return;
      }
      if(isSignup){
        const confirm = document.getElementById('auth-confirm').value;
        if(passwordValue !== confirm){
          messageEl.className = 'form-message error';
          messageEl.textContent = 'Passwords do not match.';
          return;
        }
        if(passwordValue.length < 8){
          messageEl.className = 'form-message error';
          messageEl.textContent = 'Use at least 8 characters.';
          return;
        }
      }

      submit.disabled = true;
      submit.textContent = isSignup ? 'Creating…' : 'Signing in…';
      try{
        if(isSignup){
          const { data, error } = await supabaseClient.auth.signUp({
            email: emailValue,
            password: passwordValue,
            options: { emailRedirectTo: currentPageUrl() }
          });
          if(error) throw error;
          if(data.session){
            await enterApp(data.user);
          } else {
            messageEl.className = 'form-message success';
            messageEl.textContent = 'Account created. Check your email to confirm it, then sign in.';
          }
        } else {
          const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: emailValue,
            password: passwordValue
          });
          if(error) throw error;
          await enterApp(data.user);
        }
      }catch(error){
        messageEl.className = 'form-message error';
        messageEl.textContent = error.message || 'Authentication failed.';
      }finally{
        submit.disabled = false;
        submit.textContent = isSignup ? 'Create account' : 'Sign in';
      }
    }

    submit.addEventListener('click', submitAuth);
    [email,password].forEach(el=>el.addEventListener('keydown', e=>{
      if(e.key==='Enter'){ e.preventDefault(); submitAuth(); }
    }));
    document.getElementById('auth-switch').addEventListener('click', ()=>renderAuth(isSignup?'signin':'signup'));

          messageEl.textContent = 'Enter your email first.';

          messageEl.textContent = error.message;

  // Monday-start weeks, always 7 real days. First/last week of the grid
  // can spill into the adjacent month so every week stays a full 7 days.
  function getMonthGridWeeks(year, month){
    const firstOfMonth = new Date(year, month, 1);
    const lastOfMonth = new Date(year, month+1, 0);
    const firstWeekday = firstOfMonth.getDay(); // 0=Sun..6=Sat
    const offset = (firstWeekday + 6) % 7; // days back to Monday
    const start = new Date(year, month, 1 - offset);

    const weeks = [];
    let cur = new Date(start);
    while(true){
      const week = [];
      for(let i=0;i<7;i++){
        week.push(new Date(cur));
        cur.setDate(cur.getDate()+1);
      }
      weeks.push(week);
      if(week[6] >= lastOfMonth) break;
    }
    return weeks;
  }

  function isOutsideMonth(d){
    return !(d.getFullYear()===nav.year && d.getMonth()===nav.month);
  }

  // Items appear from the day they were created through the day they were
  // completed. They remain visibly crossed off on the completion day, then
  // disappear from every later day while staying in the saved history.
  function itemsForDay(dateStr){
    return state.checklistItems.filter(it=>{
      const createdDate = it.createdDate || '0000-01-01';
      const doneDate = it.doneDate || null;
      return dateStr >= createdDate && (!doneDate || dateStr <= doneDate);
    });
  }

  function dayStats(dateStr){
    const day = getDay(dateStr);
    const relevant = itemsForDay(dateStr);
    const total = relevant.length;
    const done = relevant.filter(it=>it.doneDate===dateStr).length;
    const hasEntry = !!(day && day.journalText && day.journalText.trim().length>0);
    return {done, total, hasEntry};
  }

  function calcStreak(){
    let streak = 0;
    let d = new Date(today);
    while(true){
      const ds = fmt(d);
      const day = getDay(ds);
      if(day && day.journalText && day.journalText.trim().length>0){
        streak++;
        d.setDate(d.getDate()-1);
      } else break;
    }
    return streak;
  }

  function totalEntries(){
    return Object.keys(state.days).filter(ds=>{
      const day = state.days[ds];
      return day && day.journalText && day.journalText.trim().length>0;
    }).length;
  }

  function jumpToToday(){
    nav.year = today.getFullYear();
    nav.month = today.getMonth();
    const weeks = getMonthGridWeeks(nav.year, nav.month);
    const week = weeks.find(w=>w.some(d=>fmt(d)===todayStr));
    nav.weekDays = week;
    nav.dateStr = todayStr;
    renderDay();
  }

        ${checklistHtml}
        <div class="add-item-row">
          <input type="text" id="new-item-input" placeholder="Add a checklist item…">
          <button class="btn" id="add-item-btn">Add</button>
        </div>
      </section>

      <section class="block">
        <h2 class="block-title">Prompt</h2>
        <div class="prompt-box">
          <p class="prompt-text" id="prompt-text">${escapeHtml(prompt)}</p>
          <div class="prompt-actions">
            <button class="btn-ghost" id="shuffle-prompt">New prompt</button>
          </div>
        </div>
        <textarea id="journal-textarea" placeholder="Start writing…">${escapeHtml(day.journalText||'')}</textarea>
        <div class="save-row">
          <span class="word-count" id="word-count"></span>
          <span class="save-indicator" id="save-indicator">Saved</span>
        </div>
      </section>
    `;

    contentEl.querySelector('[data-nav="back-week"]').addEventListener('click', renderWeek);

    contentEl.querySelectorAll('#checklist-list input[type=checkbox]').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        const li = cb.closest('li');
        const id = li.getAttribute('data-item-id');
        const item = state.checklistItems.find(it=>it.id===id);
        if(item){
          item.doneDate = cb.checked ? dateStr : null;
        }
        saveState(true);
        renderDay();
      });
    });
    contentEl.querySelectorAll('[data-del]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.getAttribute('data-del');
        state.checklistItems = state.checklistItems.filter(it=>it.id!==id);
        saveState(true);
        renderDay();
      });
    });
    function addItem(){
      const input = document.getElementById('new-item-input');
      const v = input.value.trim();
      if(!v) return;
      state.checklistItems.push(makeChecklistItem(v, dateStr));
      input.value='';
      saveState(true);
      renderDay();
    }
    document.getElementById('add-item-btn').addEventListener('click', addItem);
    document.getElementById('new-item-input').addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){ e.preventDefault(); addItem(); }
    });

    document.getElementById('shuffle-prompt').addEventListener('click', ()=>{
      let idx;
      do { idx = Math.floor(Math.random()*PROMPTS.length); } while(PROMPTS.length>1 && idx===day.promptIndex);
      day.promptIndex = idx;
      document.getElementById('prompt-text').textContent = PROMPTS[idx];
      saveState(true);
    });

    const ta = document.getElementById('journal-textarea');
    const wc = document.getElementById('word-count');
    const indicator = document.getElementById('save-indicator');
    function updateWordCount(){
      const words = ta.value.trim().length ? ta.value.trim().split(/\s+/).length : 0;
      wc.textContent = words + (words===1 ? ' word' : ' words');
    }
    updateWordCount();
    ta.addEventListener('input', ()=>{
      day.journalText = ta.value;
      updateWordCount();
      indicator.classList.remove('show');
      saveState(false);
      clearTimeout(ta._flashTimer);
      ta._flashTimer = setTimeout(()=>{
        indicator.classList.add('show');
        setTimeout(()=>indicator.classList.remove('show'), 1200);
      }, 550);
    });
  }

  function escapeHtml(s){
    return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  document.getElementById('home-btn').addEventListener('click', ()=>{ if(appReady) renderHome(); });
  document.getElementById('settings-btn').addEventListener('click', ()=>{ if(appReady) renderSettings(); });

  async function bootstrap(){
    document.body.setAttribute('data-theme', 'sage');
    if(!CONFIGURED || !window.supabase){
      renderConfigNeeded();
      return;
    }

    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    supabaseClient.auth.onAuthStateChange((event, session)=>{
      setTimeout(()=>{
        if(event==='PASSWORD_RECOVERY'){
          currentUser = session && session.user ? session.user : currentUser;
          renderPasswordRecovery();
          return;
        }
        if(event==='SIGNED_OUT'){
          currentUser = null;
          appReady = false;
          state = defaultState();
          setSyncStatus('');
          renderAuth('signin');
          return;
        }
        if(session && session.user && !recoveryMode){
          enterApp(session.user);
        }
      }, 0);
    });

    const { data, error } = await supabaseClient.auth.getSession();
    if(error){
      renderAuth('signin', error.message, 'error');
      return;
    }
    if(data.session && data.session.user){
      await enterApp(data.session.user);
    }else{
      renderAuth('signin');
    }
  }

  bootstrap();
})();
</script>
</body>
</html>
