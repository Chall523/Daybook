<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root{ --radius: 10px; }
  [data-theme="sage"]{
    --bg:#f4f7f2; --surface:#ffffff; --surface-alt:#eaf0e6; --border:#d3ddce;
    --text:#3d4a37; --text-muted:#748268; --accent:#8fae7c; --accent-text:#ffffff; --accent-hover:#7d9c6a;
  }
  [data-theme="lavender"]{
    --bg:#f6f4f9; --surface:#ffffff; --surface-alt:#ece5f3; --border:#ddd0e8;
    --text:#453a52; --text-muted:#87788f; --accent:#a58cc4; --accent-text:#ffffff; --accent-hover:#9179b3;
  }
  [data-theme="blush"]{
    --bg:#faf4f5; --surface:#ffffff; --surface-alt:#f5e6e9; --border:#edd3d8;
    --text:#55383e; --text-muted:#93777c; --accent:#d894a0; --accent-text:#ffffff; --accent-hover:#c67c89;
  }
  [data-theme="sky"]{
    --bg:#f2f6f9; --surface:#ffffff; --surface-alt:#e3edf4; --border:#cddce6;
    --text:#33454f; --text-muted:#6f8590; --accent:#7fa8c4; --accent-text:#ffffff; --accent-hover:#6994b2;
  }
  [data-theme="sand"]{
    --bg:#f8f5f0; --surface:#ffffff; --surface-alt:#f0e8db; --border:#e3d6c1;
    --text:#55483a; --text-muted:#948572; --accent:#c9a876; --accent-text:#4a3d24; --accent-hover:#b8955f;
  }
  [data-theme="mist"]{
    --bg:#f4f5f6; --surface:#ffffff; --surface-alt:#e7eaec; --border:#d4d9dc;
    --text:#3c4247; --text-muted:#7a8288; --accent:#8fa0aa; --accent-text:#ffffff; --accent-hover:#7c8f9a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
  }
  #app{max-width:640px;margin:0 auto;padding:20px 16px 60px;}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
  h1{font-size:1.3rem;margin:0;font-weight:600;letter-spacing:.2px;}
  .header-right{display:flex;align-items:center;gap:8px;}
  .swatches{display:flex;gap:6px;}
  .swatch{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;}
  .swatch.active{border-color:var(--text);}
  .swatch[data-c="sage"]{background:#8fae7c;}
  .swatch[data-c="lavender"]{background:#a58cc4;}
  .swatch[data-c="blush"]{background:#d894a0;}
  .swatch[data-c="sky"]{background:#7fa8c4;}
  .swatch[data-c="sand"]{background:#c9a876;}
  .swatch[data-c="mist"]{background:#8fa0aa;}

  button{font-family:inherit;cursor:pointer;}
  .btn{background:var(--accent);color:var(--accent-text);border:none;border-radius:8px;padding:8px 14px;font-size:.85rem;font-weight:500;}
  .btn:hover{background:var(--accent-hover);}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:.85rem;}
  .btn-ghost:hover{background:var(--surface-alt);}
  .icon-btn{background:transparent;border:1px solid var(--border);border-radius:8px;width:34px;height:34px;color:var(--text);font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .icon-btn:hover{background:var(--surface-alt);}

  .month-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .month-title{font-size:1.1rem;font-weight:600;flex:1;text-align:center;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
  .week-card{cursor:pointer;transition:background .15s;}
  .week-card:hover{background:var(--surface-alt);}
  .week-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .week-label{font-weight:600;font-size:.95rem;}
  .week-range{color:var(--text-muted);font-size:.8rem;}
  .dot-row{display:flex;gap:5px;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--border);}
  .dot.filled{background:var(--accent);}
  .dot.today-ring{box-shadow:0 0 0 2px var(--text-muted);}

  .day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
  .day-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;}
  .day-card:hover{background:var(--surface-alt);}
  .day-card.today{border-color:var(--accent);border-width:2px;}
  .day-card.outside-month{opacity:.5;}
  .day-card .dow{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;}
  .day-card .dnum{font-size:1.1rem;font-weight:600;margin:4px 0;}
  .progress-mini{height:4px;background:var(--surface-alt);border-radius:2px;overflow:hidden;margin-top:4px;}
  .progress-mini-fill{height:100%;background:var(--accent);}
  .entry-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin:4px auto 0;}

  .back-link{background:none;border:none;color:var(--text-muted);font-size:.85rem;padding:0;margin-bottom:14px;display:flex;align-items:center;gap:4px;}
  .back-link:hover{color:var(--text);}

  .day-heading{font-size:1.25rem;font-weight:600;margin:0 0 4px;}
  .day-sub{color:var(--text-muted);font-size:.85rem;margin:0 0 18px;}

  section.block{margin-bottom:22px;}
  h2.block-title{font-size:.8rem;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin:0 0 10px;font-weight:600;}

  ul.checklist{list-style:none;padding:0;margin:0 0 10px;}
  ul.checklist li{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--border);}
  ul.checklist li:last-child{border-bottom:none;}
  ul.checklist input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;}
  ul.checklist label{flex:1;font-size:.92rem;cursor:pointer;}
  ul.checklist li.checked label{color:var(--text-muted);text-decoration:line-through;}
  .del-item{background:none;border:none;color:var(--text-muted);font-size:1rem;padding:2px 6px;line-height:1;}
  .del-item:hover{color:var(--text);}
  .checklist-note{font-size:.75rem;color:var(--text-muted);margin:0 0 10px;}

  .add-item-row{display:flex;gap:8px;}
  .add-item-row input{flex:1;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:.88rem;background:var(--surface);color:var(--text);}
  .add-item-row input:focus{outline:none;border-color:var(--accent);}

  .prompt-box{background:var(--surface-alt);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
  .prompt-text{font-size:.98rem;font-style:italic;margin:0;}
  .prompt-actions{margin-top:8px;}

  textarea{width:100%;min-height:220px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:inherit;font-size:.95rem;line-height:1.5;resize:vertical;}
  textarea:focus{outline:none;border-color:var(--accent);}
  .save-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
  .save-indicator{font-size:.75rem;color:var(--text-muted);opacity:0;transition:opacity .3s;}
  .save-indicator.show{opacity:1;}
  .word-count{font-size:.75rem;color:var(--text-muted);}

  .stats-row{display:flex;gap:10px;margin-bottom:18px;}
  .stat-pill{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;text-align:center;}
  .stat-pill strong{display:block;font-size:1.3rem;font-weight:700;color:var(--text);}
  .stat-pill span{font-size:.75rem;color:var(--text-muted);}
  .home-cta{width:100%;margin-bottom:8px;}

  .lock-wrap{text-align:center;padding:60px 20px;}
  .lock-input{max-width:220px;width:100%;text-align:center;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:1rem;margin-bottom:10px;}
  .lock-error{color:#c0392b;font-size:.8rem;min-height:16px;margin-bottom:14px;}
  .pass-form input{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:.88rem;background:var(--surface);color:var(--text);margin-bottom:8px;}

  .loading{text-align:center;padding:60px 0;color:var(--text-muted);}
  @media (max-width:420px){
    .day-card{padding:8px 3px;}
    .day-card .dnum{font-size:.95rem;}
  }
</style>
</head>
<body data-theme="sage">
<div id="app">
  <header>
    <button class="icon-btn" id="home-btn" title="Home">⌂</button>
    <h1>Daybook</h1>
    <div class="header-right">
      <button class="icon-btn" id="settings-btn" title="Settings">⚙</button>
      <div class="swatches" id="swatches"></div>
    </div>
  </header>
  <div id="content"><div class="loading">Loading your journal…</div></div>
</div>

<script>
(function(){
  const THEMES = ['sage','lavender','blush','sky','sand','mist'];
  const PROMPTS = [
    "What's something funny that happened today?",
    "Are you happy with what you did today?",
    "What's one thing you're grateful for right now?",
    "What was the hardest part of today, and how did you handle it?",
    "Who made you smile today?",
    "What's something you learned today?",
    "If today had a title, what would it be?",
    "What's one small win you had today?",
    "What are you looking forward to tomorrow?",
    "What's something you'd do differently if you could redo today?",
    "Describe today in three words.",
    "What made you feel proud today?",
    "What's on your mind that you haven't said out loud?",
    "What's a conversation that stuck with you today?",
    "What did you do today that your future self will thank you for?",
    "What drained your energy today, and what gave you energy?",
    "What's something you're avoiding right now?",
    "What surprised you today?",
    "How did you take care of yourself today?",
    "What's a small thing that annoyed you today, and does it really matter?",
    "What did you create, build, or fix today?",
    "What's a moment from today you want to remember?",
    "How are you really feeling right now?",
    "What's something kind someone did for you today?",
    "What's something kind you did for someone else today?",
    "What question do you wish someone had asked you today?",
    "What's one thing you want to let go of before tomorrow?",
    "What did today teach you about yourself?",
    "What's something you're curious about right now?",
    "If you could tell yourself one thing this morning, what would it be?"
  ];

  const AFFIRMATIONS = [
    "You're capable of figuring this out.",
    "Progress doesn't have to be perfect to count.",
    "You've handled hard things before.",
    "One task at a time is enough.",
    "You don't have to feel ready to start.",
    "Today's effort counts, even if it's small.",
    "You get to define what success looks like.",
    "Rest is part of the process, not a break from it.",
    "You're allowed to change your mind.",
    "Consistency matters more than intensity.",
    "Doubt isn't proof you're doing it wrong.",
    "Small steps still move you forward.",
    "You can be proud and still want more.",
    "It's okay not to have it all figured out yet.",
    "Your pace is still progress.",
    "You're building something, even on slow days.",
    "Confidence comes from doing, not from waiting to feel ready.",
    "You don't have to earn rest.",
    "What you're working on matters, even when it's invisible right now.",
    "You can reset at any point in the day.",
    "Showing up inconsistently still beats not showing up.",
    "You're allowed to move at your own speed.",
    "Effort compounds even when results are slow.",
    "You don't need to have the answer today."
  ];

  const SEED_ITEMS = [
    "Content Review",
    "Jack Westin",
    "Tangen Projects Brainstorm",
    "Send CGT emails",
    "Attempt Rajapakse Project within own, keep tabs",
    "Follow up with hamza",
    "Miner Lab papers",
    "RVCL brain imaging stuff",
    "Primer design + message to debby about experiment",
    "Get back to yi-an continue thinking through calendar and med school app",
    "EMT applications and clinical volunteering - narberth follow up after ARD",
    "orthopedic surgeon interviews / senior design + shadowing",
    "Explore the handshake stuff like consulting etc.",
    "Address holes in med school application - talk to chat/claude",
    "some venmo requests from sandro, shiv, family",
    "Get back to erika",
    "Tour tomorrow"
  ];

  const DOW = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // Local storage adapter — replaces Claude's window.storage API so this
  // runs standalone on GitHub Pages / Netlify / anywhere else.
  const storage = {
    async get(key){
      const v = localStorage.getItem(key);
      return v === null ? null : { key, value: v };
    },
    async set(key, value){
      localStorage.setItem(key, value);
      return { key, value };
    }
  };

  let state = { theme:'sage', checklistItems: [], goals: [], homeAffirmation: null, passcodeHash: null, days: {} };
  let saveTimer = null;
  let unlocked = false;

  const today = new Date();
  const todayStr = fmt(today);
  let nav = { view:'home', year: today.getFullYear(), month: today.getMonth(), weekDays: null, dateStr: null };

  const contentEl = document.getElementById('content');
  const swatchesEl = document.getElementById('swatches');

  function pad(n){ return n<10 ? '0'+n : ''+n; }
  function fmt(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function parseDateStr(s){ const p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
  function niceDate(d){ return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }
  function shortRange(a,b){
    return a.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+b.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }

  function getDay(dateStr){ return state.days[dateStr] || null; }
  function ensureDay(dateStr){
    if(!state.days[dateStr]) state.days[dateStr] = { journalText:'', promptIndex:null };
    return state.days[dateStr];
  }

  function hashIndex(str, mod){
    let h=0;
    for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
    return h % mod;
  }
  // Not cryptographic — this only exists to avoid storing the passcode as
  // plain text. It's a privacy screen, not real security.
  function simpleHash(str){
    let h = 5381;
    for(let i=0;i<str.length;i++){ h = ((h*33) ^ str.charCodeAt(i)) >>> 0; }
    return h.toString(36);
  }
  function getPromptForDate(dateStr){
    const day = getDay(dateStr);
    if(day && day.promptIndex!==null && day.promptIndex!==undefined) return PROMPTS[day.promptIndex];
    return PROMPTS[hashIndex(dateStr, PROMPTS.length)];
  }
  function getAffirmationForToday(){
    if(state.homeAffirmation && state.homeAffirmation.date===todayStr){
      return AFFIRMATIONS[state.homeAffirmation.index];
    }
    return AFFIRMATIONS[hashIndex(todayStr, AFFIRMATIONS.length)];
  }

  function seedChecklistItems(){
    const existing = new Set(state.checklistItems.map(it=>it.text.trim().toLowerCase()));
    SEED_ITEMS.forEach(text=>{
      const key = text.trim().toLowerCase();
      if(!existing.has(key)){
        state.checklistItems.push({id:'c'+Date.now()+Math.random().toString(36).slice(2,7), text, doneDate:null});
        existing.add(key);
      }
    });
  }

  async function loadState(){
    try{
      const res = await storage.get('daybook-state');
      if(res && res.value){
        const parsed = JSON.parse(res.value);
        state = Object.assign({theme:'sage', checklistItems:[], goals:[], homeAffirmation:null, passcodeHash:null, days:{}}, parsed);
        state.checklistItems.forEach(it=>{ if(it.doneDate===undefined) it.doneDate = null; });
        if(!Array.isArray(state.goals)) state.goals = [];
      } else {
        state = defaultState();
      }
    }catch(e){
      state = defaultState();
    }
    seedChecklistItems();
    await saveState(true);
    document.body.setAttribute('data-theme', state.theme || 'sage');
    renderSwatches();
    if(state.passcodeHash){
      renderLock();
    } else {
      unlocked = true;
      renderHome();
    }
  }

  function defaultState(){
    return {
      theme:'sage',
      checklistItems:[
        {id:'c1', text:'Drink water', doneDate:null},
        {id:'c2', text:'Move your body', doneDate:null},
        {id:'c3', text:'Read for 15 minutes', doneDate:null}
      ],
      goals: [],
      homeAffirmation: null,
      passcodeHash: null,
      days:{}
    };
  }

  async function saveState(immediate){
    if(saveTimer) clearTimeout(saveTimer);
    if(immediate){
      try{ await storage.set('daybook-state', JSON.stringify(state)); }catch(e){}
      return;
    }
    saveTimer = setTimeout(async ()=>{
      try{ await storage.set('daybook-state', JSON.stringify(state)); }catch(e){}
    }, 500);
  }

  function renderSwatches(){
    swatchesEl.innerHTML = THEMES.map(t=>
      `<button class="swatch ${state.theme===t?'active':''}" data-c="${t}" title="${t}"></button>`
    ).join('');
    swatchesEl.querySelectorAll('.swatch').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.theme = btn.getAttribute('data-c');
        document.body.setAttribute('data-theme', state.theme);
        renderSwatches();
        saveState(true);
      });
    });
  }

  function renderLock(){
    contentEl.innerHTML = `
      <div class="lock-wrap">
        <div style="font-size:2rem;margin-bottom:10px;">⌂</div>
        <h2 style="margin:0 0 6px;">Daybook is locked</h2>
        <p class="day-sub">Enter your passcode to continue.</p>
        <input type="password" id="lock-input" class="lock-input" placeholder="Passcode">
        <div id="lock-error" class="lock-error"></div>
        <div><button class="btn" id="unlock-btn">Unlock</button></div>
        <button class="btn-ghost" id="forgot-btn" style="margin-top:24px;">Forgot passcode?</button>
        <div id="forgot-confirm" style="display:none;margin-top:14px;">
          <p class="checklist-note">This clears everything — entries, checklist, goals — with no way to undo it.</p>
          <button class="btn" id="confirm-reset-btn" style="background:#c0392b;">Reset all data</button>
          <button class="btn-ghost" id="cancel-reset-btn">Cancel</button>
        </div>
      </div>
    `;
    const input = document.getElementById('lock-input');
    const err = document.getElementById('lock-error');
    function tryUnlock(){
      if(simpleHash(input.value) === state.passcodeHash){
        unlocked = true;
        renderHome();
      } else {
        err.textContent = 'Wrong passcode.';
        input.value='';
        input.focus();
      }
    }
    document.getElementById('unlock-btn').addEventListener('click', tryUnlock);
    input.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); tryUnlock(); } });
    input.focus();

    document.getElementById('forgot-btn').addEventListener('click', ()=>{
      document.getElementById('forgot-confirm').style.display='block';
    });
    document.getElementById('cancel-reset-btn').addEventListener('click', ()=>{
      document.getElementById('forgot-confirm').style.display='none';
    });
    document.getElementById('confirm-reset-btn').addEventListener('click', async ()=>{
      state = defaultState();
      seedChecklistItems();
      unlocked = true;
      await saveState(true);
      renderHome();
    });
  }

  function renderSettings(){
    nav.view='settings';
    const hasPasscode = !!state.passcodeHash;
    contentEl.innerHTML = `
      <button class="back-link" data-nav="home">‹ Home</button>
      <h2 class="day-heading">Settings</h2>
      <section class="block">
        <h2 class="block-title">Passcode Lock</h2>
        <p class="checklist-note">${hasPasscode ? "A passcode is set. It's a privacy screen, not real encryption — anyone with dev-tools access to this browser could bypass it." : "Add a passcode to require it on load. It's a privacy screen, not real encryption."}</p>
        <div id="pass-actions">
          ${hasPasscode ? `
            <button class="btn-ghost" id="change-pass-btn" style="margin-bottom:8px;">Change Passcode</button>
            <button class="btn-ghost" id="remove-pass-btn">Remove Passcode</button>
          ` : `
            <div class="pass-form" id="set-pass-form">
              <input type="password" id="new-pass" placeholder="New passcode">
              <input type="password" id="confirm-pass" placeholder="Confirm passcode">
              <div id="pass-error" class="lock-error"></div>
              <button class="btn" id="save-pass-btn">Set Passcode</button>
            </div>
          `}
        </div>
      </section>
    `;
    contentEl.querySelector('[data-nav="home"]').addEventListener('click', renderHome);

    function wireSaveForm(onSaved){
      document.getElementById('save-pass-btn').addEventListener('click', async ()=>{
        const p1 = document.getElementById('new-pass').value;
        const p2 = document.getElementById('confirm-pass').value;
        const err = document.getElementById('pass-error');
        if(!p1){ err.textContent='Enter a passcode.'; return; }
        if(p1!==p2){ err.textContent="Passcodes don't match."; return; }
        state.passcodeHash = simpleHash(p1);
        await saveState(true);
        onSaved();
      });
    }

    if(!hasPasscode){
      wireSaveForm(()=>renderSettings());
    } else {
      document.getElementById('remove-pass-btn').addEventListener('click', async ()=>{
        state.passcodeHash = null;
        await saveState(true);
        renderSettings();
      });
      document.getElementById('change-pass-btn').addEventListener('click', ()=>{
        document.getElementById('pass-actions').innerHTML = `
          <div class="pass-form" id="set-pass-form">
            <input type="password" id="new-pass" placeholder="New passcode">
            <input type="password" id="confirm-pass" placeholder="Confirm passcode">
            <div id="pass-error" class="lock-error"></div>
            <button class="btn" id="save-pass-btn">Save New Passcode</button>
          </div>
        `;
        wireSaveForm(()=>renderSettings());
      });
    }
  }

  // Monday-start weeks, always 7 real days. First/last week of the grid
  // can spill into the adjacent month so every week stays a full 7 days.
  function getMonthGridWeeks(year, month){
    const firstOfMonth = new Date(year, month, 1);
    const lastOfMonth = new Date(year, month+1, 0);
    const firstWeekday = firstOfMonth.getDay(); // 0=Sun..6=Sat
    const offset = (firstWeekday + 6) % 7; // days back to Monday
    const start = new Date(year, month, 1 - offset);

    const weeks = [];
    let cur = new Date(start);
    while(true){
      const week = [];
      for(let i=0;i<7;i++){
        week.push(new Date(cur));
        cur.setDate(cur.getDate()+1);
      }
      weeks.push(week);
      if(week[6] >= lastOfMonth) break;
    }
    return weeks;
  }

  function isOutsideMonth(d){
    return !(d.getFullYear()===nav.year && d.getMonth()===nav.month);
  }

  // An item "belongs" to a given day if it's still active (not done anywhere)
  // or if it was completed on exactly that day. Once checked off, it drops
  // out of every later day automatically.
  function itemsForDay(dateStr){
    return state.checklistItems.filter(it => it.doneDate === dateStr || !it.doneDate);
  }

  function dayStats(dateStr){
    const day = getDay(dateStr);
    const relevant = itemsForDay(dateStr);
    const total = relevant.length;
    const done = relevant.filter(it=>it.doneDate===dateStr).length;
    const hasEntry = !!(day && day.journalText && day.journalText.trim().length>0);
    return {done, total, hasEntry};
  }

  function calcStreak(){
    let streak = 0;
    let d = new Date(today);
    while(true){
      const ds = fmt(d);
      const day = getDay(ds);
      if(day && day.journalText && day.journalText.trim().length>0){
        streak++;
        d.setDate(d.getDate()-1);
      } else break;
    }
    return streak;
  }

  function totalEntries(){
    return Object.keys(state.days).filter(ds=>{
      const day = state.days[ds];
      return day && day.journalText && day.journalText.trim().length>0;
    }).length;
  }

  function jumpToToday(){
    nav.year = today.getFullYear();
    nav.month = today.getMonth();
    const weeks = getMonthGridWeeks(nav.year, nav.month);
    const week = weeks.find(w=>w.some(d=>fmt(d)===todayStr));
    nav.weekDays = week;
    nav.dateStr = todayStr;
    renderDay();
  }

  function renderHome(){
    nav.view = 'home';
    const streak = calcStreak();
    const total = totalEntries();
    const aff = getAffirmationForToday();

    let goalsHtml;
    if(state.goals.length===0){
      goalsHtml = `<p class="checklist-note">No goals yet. Add one below.</p>`;
    } else {
      goalsHtml = `<ul class="checklist" id="goals-list">` +
        state.goals.map(g=>`<li class="${g.done?'checked':''}" data-goal-id="${g.id}">
          <input type="checkbox" id="goal-${g.id}" ${g.done?'checked':''}>
          <label for="goal-${g.id}">${escapeHtml(g.text)}</label>
          <button class="del-item" data-del-goal="${g.id}" title="Remove">×</button>
        </li>`).join('') +
      `</ul>`;
    }

    contentEl.innerHTML = `
      <div class="stats-row">
        <div class="stat-pill"><strong>${streak}</strong><span>day streak</span></div>
        <div class="stat-pill"><strong>${total}</strong><span>entries</span></div>
      </div>
      <section class="block">
        <h2 class="block-title">Affirmation</h2>
        <div class="prompt-box">
          <p class="prompt-text" id="affirmation-text">${escapeHtml(aff)}</p>
          <div class="prompt-actions">
            <button class="btn-ghost" id="shuffle-affirmation">New affirmation</button>
          </div>
        </div>
      </section>
      <section class="block">
        <h2 class="block-title">Goals</h2>
        ${goalsHtml}
        <div class="add-item-row">
          <input type="text" id="new-goal-input" placeholder="Add a goal…">
          <button class="btn" id="add-goal-btn">Add</button>
        </div>
      </section>
      <button class="btn home-cta" id="today-btn">Today's Entry</button>
      <button class="btn-ghost home-cta" id="calendar-btn">Open Calendar</button>
    `;

    contentEl.querySelectorAll('#goals-list input[type=checkbox]').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        const li = cb.closest('li');
        const id = li.getAttribute('data-goal-id');
        const g = state.goals.find(x=>x.id===id);
        if(g) g.done = cb.checked;
        li.classList.toggle('checked', cb.checked);
        saveState(true);
      });
    });
    contentEl.querySelectorAll('[data-del-goal]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.getAttribute('data-del-goal');
        state.goals = state.goals.filter(g=>g.id!==id);
        saveState(true);
        renderHome();
      });
    });
    function addGoal(){
      const input = document.getElementById('new-goal-input');
      const v = input.value.trim();
      if(!v) return;
      state.goals.push({id:'g'+Date.now()+Math.random().toString(36).slice(2,6), text:v, done:false});
      input.value='';
      saveState(true);
      renderHome();
    }
    document.getElementById('add-goal-btn').addEventListener('click', addGoal);
    document.getElementById('new-goal-input').addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){ e.preventDefault(); addGoal(); }
    });

    document.getElementById('shuffle-affirmation').addEventListener('click', ()=>{
      let idx;
      do{ idx = Math.floor(Math.random()*AFFIRMATIONS.length); }
      while(AFFIRMATIONS.length>1 && state.homeAffirmation && state.homeAffirmation.date===todayStr && idx===state.homeAffirmation.index);
      state.homeAffirmation = {date: todayStr, index: idx};
      document.getElementById('affirmation-text').textContent = AFFIRMATIONS[idx];
      saveState(true);
    });

    document.getElementById('today-btn').addEventListener('click', jumpToToday);
    document.getElementById('calendar-btn').addEventListener('click', renderMonth);
  }

  function renderMonth(){
    nav.view='month';
    const weeks = getMonthGridWeeks(nav.year, nav.month);
    let html = `
      <button class="back-link" data-nav="home">‹ Home</button>
      <div class="month-nav">
        <button class="icon-btn" data-nav="month-prev">‹</button>
        <div class="month-title">${MONTH_NAMES[nav.month]} ${nav.year}</div>
        <button class="icon-btn" data-nav="month-next">›</button>
      </div>
      <div style="text-align:center;margin-bottom:16px;">
        <button class="btn-ghost" data-nav="today">Today</button>
      </div>
    `;
    weeks.forEach((week, idx)=>{
      const first = week[0], last = week[6];
      const dots = week.map(d=>{
        const ds = fmt(d);
        const st = dayStats(ds);
        const isToday = ds===todayStr;
        return `<span class="dot ${st.hasEntry?'filled':''} ${isToday?'today-ring':''}"></span>`;
      }).join('');
      html += `
        <div class="card week-card" data-nav="week" data-week-idx="${idx}">
          <div class="week-card-top">
            <span class="week-label">Week ${idx+1}</span>
            <span class="week-range">${shortRange(first,last)}</span>
          </div>
          <div class="dot-row">${dots}</div>
        </div>
      `;
    });
    contentEl.innerHTML = html;
    attachMonthListeners(weeks);
  }

  function attachMonthListeners(weeks){
    contentEl.querySelectorAll('[data-nav="week"]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const idx = parseInt(el.getAttribute('data-week-idx'),10);
        nav.weekDays = weeks[idx];
        renderWeek();
      });
    });
    const homeLink = contentEl.querySelector('[data-nav="home"]');
    if(homeLink) homeLink.addEventListener('click', renderHome);
    const prev = contentEl.querySelector('[data-nav="month-prev"]');
    const next = contentEl.querySelector('[data-nav="month-next"]');
    const todayBtn = contentEl.querySelector('[data-nav="today"]');
    if(prev) prev.addEventListener('click', ()=>{
      nav.month--; if(nav.month<0){nav.month=11; nav.year--;}
      renderMonth();
    });
    if(next) next.addEventListener('click', ()=>{
      nav.month++; if(nav.month>11){nav.month=0; nav.year++;}
      renderMonth();
    });
    if(todayBtn) todayBtn.addEventListener('click', ()=>{
      nav.year = today.getFullYear(); nav.month = today.getMonth();
      renderMonth();
    });
  }

  function renderWeek(){
    nav.view='week';
    const week = nav.weekDays;
    const first = week[0], last = week[6];
    let html = `
      <button class="back-link" data-nav="back-month">‹ Back to ${MONTH_NAMES[nav.month]}</button>
      <div class="day-sub" style="margin-bottom:14px;">${shortRange(first,last)}, ${nav.year}</div>
      <div class="day-grid">
    `;
    week.forEach((d,i)=>{
      const ds = fmt(d);
      const st = dayStats(ds);
      const isToday = ds===todayStr;
      const outside = isOutsideMonth(d);
      const pct = st.total>0 ? Math.round((st.done/st.total)*100) : 0;
      html += `
        <div class="day-card ${isToday?'today':''} ${outside?'outside-month':''}" data-nav="day" data-date="${ds}">
          <div class="dow">${DOW[i]}</div>
          <div class="dnum">${d.getDate()}${outside ? ' <span style="font-size:.6rem;">'+MONTH_NAMES[d.getMonth()].slice(0,3)+'</span>' : ''}</div>
          ${st.total>0 ? `<div class="progress-mini"><div class="progress-mini-fill" style="width:${pct}%"></div></div>` : ''}
          ${st.hasEntry ? '<div class="entry-dot"></div>' : ''}
        </div>
      `;
    });
    html += `</div>`;
    contentEl.innerHTML = html;
    contentEl.querySelector('[data-nav="back-month"]').addEventListener('click', renderMonth);
    contentEl.querySelectorAll('[data-nav="day"]').forEach(el=>{
      el.addEventListener('click', ()=>{
        nav.dateStr = el.getAttribute('data-date');
        renderDay();
      });
    });
  }

  function renderDay(){
    nav.view='day';
    const dateStr = nav.dateStr;
    const date = parseDateStr(dateStr);
    const day = ensureDay(dateStr);
    const isToday = dateStr===todayStr;
    const prompt = getPromptForDate(dateStr);
    const visibleItems = itemsForDay(dateStr);

    let checklistHtml = '';
    if(state.checklistItems.length===0){
      checklistHtml = `<p class="checklist-note">No checklist items yet. Add one below.</p>`;
    } else if(visibleItems.length===0){
      checklistHtml = `<p class="checklist-note">Everything's checked off for this day.</p>`;
    } else {
      checklistHtml = `<p class="checklist-note">Unchecked items carry over every day. Checking one off clears it from tomorrow on.</p>
        <ul class="checklist" id="checklist-list">` +
        visibleItems.map(it=>{
          const checked = it.doneDate === dateStr;
          return `<li class="${checked?'checked':''}" data-item-id="${it.id}">
            <input type="checkbox" id="chk-${it.id}" ${checked?'checked':''}>
            <label for="chk-${it.id}">${escapeHtml(it.text)}</label>
            <button class="del-item" data-del="${it.id}" title="Remove">×</button>
          </li>`;
        }).join('') +
      `</ul>`;
    }

    contentEl.innerHTML = `
      <button class="back-link" data-nav="back-week">‹ Back to week</button>
      <h2 class="day-heading">${niceDate(date)}${isToday ? ' · Today' : ''}</h2>

      <section class="block">
        <h2 class="block-title">Checklist</h2>
        ${checklistHtml}
        <div class="add-item-row">
          <input type="text" id="new-item-input" placeholder="Add a checklist item…">
          <button class="btn" id="add-item-btn">Add</button>
        </div>
      </section>

      <section class="block">
        <h2 class="block-title">Prompt</h2>
        <div class="prompt-box">
          <p class="prompt-text" id="prompt-text">${escapeHtml(prompt)}</p>
          <div class="prompt-actions">
            <button class="btn-ghost" id="shuffle-prompt">New prompt</button>
          </div>
        </div>
        <textarea id="journal-textarea" placeholder="Start writing…">${escapeHtml(day.journalText||'')}</textarea>
        <div class="save-row">
          <span class="word-count" id="word-count"></span>
          <span class="save-indicator" id="save-indicator">Saved</span>
        </div>
      </section>
    `;

    contentEl.querySelector('[data-nav="back-week"]').addEventListener('click', renderWeek);

    contentEl.querySelectorAll('#checklist-list input[type=checkbox]').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        const li = cb.closest('li');
        const id = li.getAttribute('data-item-id');
        const item = state.checklistItems.find(it=>it.id===id);
        if(item){
          item.doneDate = cb.checked ? dateStr : null;
        }
        saveState(true);
        renderDay();
      });
    });
    contentEl.querySelectorAll('[data-del]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.getAttribute('data-del');
        state.checklistItems = state.checklistItems.filter(it=>it.id!==id);
        saveState(true);
        renderDay();
      });
    });
    function addItem(){
      const input = document.getElementById('new-item-input');
      const v = input.value.trim();
      if(!v) return;
      state.checklistItems.push({id:'c'+Date.now()+Math.random().toString(36).slice(2,6), text:v, doneDate:null});
      input.value='';
      saveState(true);
      renderDay();
    }
    document.getElementById('add-item-btn').addEventListener('click', addItem);
    document.getElementById('new-item-input').addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){ e.preventDefault(); addItem(); }
    });

    document.getElementById('shuffle-prompt').addEventListener('click', ()=>{
      let idx;
      do { idx = Math.floor(Math.random()*PROMPTS.length); } while(PROMPTS.length>1 && idx===day.promptIndex);
      day.promptIndex = idx;
      document.getElementById('prompt-text').textContent = PROMPTS[idx];
      saveState(true);
    });

    const ta = document.getElementById('journal-textarea');
    const wc = document.getElementById('word-count');
    const indicator = document.getElementById('save-indicator');
    function updateWordCount(){
      const words = ta.value.trim().length ? ta.value.trim().split(/\s+/).length : 0;
      wc.textContent = words + (words===1 ? ' word' : ' words');
    }
    updateWordCount();
    ta.addEventListener('input', ()=>{
      day.journalText = ta.value;
      updateWordCount();
      indicator.classList.remove('show');
      saveState(false);
      clearTimeout(ta._flashTimer);
      ta._flashTimer = setTimeout(()=>{
        indicator.classList.add('show');
        setTimeout(()=>indicator.classList.remove('show'), 1200);
      }, 550);
    });
  }

  function escapeHtml(s){
    return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  document.getElementById('home-btn').addEventListener('click', ()=>{ if(unlocked) renderHome(); });
  document.getElementById('settings-btn').addEventListener('click', ()=>{ if(unlocked) renderSettings(); });

  loadState();
})();
</script>
</body>
</html>
